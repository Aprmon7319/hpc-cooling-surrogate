# Configuration for Comparative Cooling Model Analysis
# This configuration file controls the comparison of different
# data center cooling models across multiple HPC systems.

# Systems to compare
# Available systems: marconi100, summit, frontier, lassen, fugaku, setonix, adastraMI250
systems:
  - marconi100
  - summit
  - lassen

# Data paths for each system (leave empty to generate data)
# Format: system_name: path/to/data.parquet
data_paths:
  # marconi100: "data/marconi100_simulation.parquet"
  # summit: "data/summit_simulation.parquet"
  # lassen: "data/lassen_simulation.parquet"

# Output directory for results
output_dir: "analysis_results/comparative_analysis"

# Data generation settings (used if data_paths not provided)
data_generation:
  enabled: true
  n_samples: 500
  transition_steps: 60
  stabilization_hours: 3
  step_size: 1
  
  # Input ranges for data generation
  input_ranges:
    Q_flow: [12.0, 40.0]    # kW - Heat load per CDU
    T_Air: [288.15, 308.15] # K (15-35°C) - Inlet air temperature
    T_ext: [283.15, 313.15] # K (10-40°C) - External/ambient temperature

# Parallelization settings
parallel:
  n_workers: 4
  threads_per_worker: 1
  memory_limit: "4GB"

# Analysis settings
analysis:
  # Time step for dynamic metrics (seconds)
  time_step: 1.0
  
  # Maximum data sample size per system (for faster analysis)
  # Set to null to use all data
  max_samples: null
  
  # Metrics to compute
  compute_efficiency: true
  compute_thermal: true
  compute_flow: true
  compute_pressure: true
  compute_dynamic: true
  compute_sensitivity: true

# Visualization settings
visualization:
  # Create individual PNG plots
  create_plots: true
  
  # Create combined PDF report
  create_pdf_report: true
  
  # Default figure size (width, height in inches)
  figsize: [14, 10]
  
  # DPI for saved figures
  dpi: 300
  
  # Specific visualizations to create
  plots:
    efficiency_comparison: true
    thermal_comparison: true
    power_profile: true
    scaling_analysis: true
    radar_chart: true
    flow_comparison: true
    dynamic_comparison: true

# Logging settings
logging:
  level: INFO
  log_to_file: true
  log_file: "comparative_analysis.log"

# Advanced settings
advanced:
  # Save raw data along with results
  save_raw_data: false
  
  # Include intermediate computation results
  save_intermediate: false
  
  # Random seed for reproducibility
  random_seed: 42
