# Non-Linear Relationship Characterization Analysis Configuration
# ================================================================
#
# This configuration file controls the non-linear characterization analysis
# for FMU input-output relationships.

# Data paths
data_path: ""  # Path to existing data file (leave empty to generate)
output_path: "results/nonlinear_characterization/"

# Parallelization settings
parallel:
  n_workers: 8              # Number of parallel workers
  threads_per_worker: 1     # Threads per Dask worker
  memory_limit: '5GB'       # Memory limit per worker

# Data generation settings
n_samples: 1000             # Number of operating conditions to sample
transition_steps: 60        # Steps for smooth transitions between conditions

# Input ranges for sensitivity analysis
input_ranges:
  Q_flow: [12.0, 40.0]      # kW (heat load per CDU)
  T_Air: [288.15, 308.15]   # K (15-35°C inlet air temperature)
  T_ext: [283.15, 313.15]   # K (10-40°C external temperature)

# Polynomial/Spline Fitting Settings
polynomial:
  max_degree: 5             # Maximum polynomial degree to test
  cv_folds: 5               # Cross-validation folds for model selection
  spline_smoothing_factors: [0.1, 0.5, 1.0, 2.0, 5.0]

# Threshold Detection Settings
threshold:
  max_breakpoints: 3        # Maximum number of breakpoints to detect
  min_segment_points: 10    # Minimum points per segment
  significance_threshold: 0.05  # Minimum R² improvement to consider significant

# Operating Regime Classification Settings
regime:
  max_regimes: 5            # Maximum number of operating regimes to detect
  silhouette_threshold: 0.25  # Minimum silhouette score for valid clustering

# Key outputs for detailed analysis
key_outputs:
  - T_prim_r_C              # Primary return temperature
  - W_flow_CDUP_kW          # CDU pump power consumption  
  - V_flow_prim_GPM         # Primary flow rate
  - T_sec_r_C               # Secondary return temperature
  - p_prim_s_psig           # Primary supply pressure
  - p_sec_s_psig            # Secondary supply pressure


# Visualization settings
visualization:
  dpi: 300                  # Figure resolution
  subsample_size: 2000      # Maximum points for scatter plots
  color_scheme: 'viridis'   # Matplotlib colormap

# Analysis toggles (can be overridden by command line)
analysis:
  polynomial_fitting: true
  threshold_detection: true
  regime_classification: true
